{% extends 'base.html' %}
{% block title %}Modifier Rendez-vous{% endblock %}

{% block content %}
<section class="card form-card">
    <h2>Modifier Rendez-vous</h2>
    <form method="post" class="form-grid">
        <label>Patient
            <select name="patient_id" required>
                {% for patient in patients %}
                <option value="{{ patient.id }}" {% if patient.id == appointment.patient_id %}selected{% endif %}>{{ patient.full_name }}</option>
                {% endfor %}
            </select>
        </label>

        <label>Dentiste
            <select name="dentist_id" required>
                {% for dentist in dentists %}
                <option value="{{ dentist.id }}" {% if dentist.id == appointment.dentist_id %}selected{% endif %}>{{ dentist.full_name }}</option>
                {% endfor %}
            </select>
        </label>

        <label>Date et heure
            <input type="datetime-local" name="appointment_datetime" value="{{ appointment.appointment_datetime.strftime('%Y-%m-%dT%H:%M') }}" required>
        </label>

        <label>Statut
            <select name="status" required>
                {% for status in status_choices %}
                <option value="{{ status }}" {% if status == appointment.status %}selected{% endif %}>{{ status }}</option>
                {% endfor %}
            </select>
        </label>

        <button type="submit">Mettre a jour</button>
    </form>
</section>
{% endblock %}
