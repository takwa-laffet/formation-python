<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Vérifier Disponibilité</title>
</head>
<body>
    <h1>Vérifier Disponibilité</h1>
    
    <nav>
        <a href="/">Voir toutes les réservations</a>
        <a href="/form">Ajouter une réservation</a>
    </nav>
    
    <form method="POST" action="/check">
        <p>
            <label>Date:</label>
            <input type="date" name="date" required>
        </p>
        <p>
            <label>Créneau:</label>
            <select name="time_slot" required>
                <option value="">Sélectionnez</option>
                <option value="09:00">09:00</option>
                <option value="10:00">10:00</option>
                <option value="11:00">11:00</option>
                <option value="12:00">12:00</option>
                <option value="13:00">13:00</option>
                <option value="14:00">14:00</option>
                <option value="15:00">15:00</option>
                <option value="16:00">16:00</option>
                <option value="17:00">17:00</option>
                <option value="18:00">18:00</option>
            </select>
        </p>
        <button type="submit">Vérifier</button>
    </form>
    
    {% if available is not none %}
        {% if available %}
        <p style="color: green">Ce créneau est disponible!</p>
        {% else %}
        <p style="color: red">Ce créneau est déjà réservé.</p>
        {% endif %}
    {% endif %}
</body>
</html>
